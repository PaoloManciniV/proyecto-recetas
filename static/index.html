<!DOCTYPE html>
<!--
============================================================
  index.html  ·  Interfaz web del Generador de Recetas
============================================================
  Pantallas:
    1. Acceso     -> registrarse o iniciar sesión
    2. Despensa   -> gestionar ingredientes
    3. Receta     -> resultado del LLM (nombre, pasos, tiempo...)
    4. Historial  -> recetas guardadas con calificación

  NUEVO (equipo):
    - Botón "Generar receta" llama a POST /recetas/generar
    - Sección de receta generada con todos sus campos
    - Historial con calificación de estrellas (1-5)
    - Eliminar recetas del historial
============================================================
-->
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Mercadito · Generador de Recetas</title>
  <link rel="icon" href="/favicon.ico">

  <style>
    /* ---------- Variables de color (naranja, blanco y negro) ---------- */
    :root {
      --crema:      #f4f4f3;
      --crema-osc:  #e2e2e0;
      --tomate:     #ff6a00;
      --tomate-osc: #e85d00;
      --verde:      #161616;
      --carbon:     #161616;
      --gris:       #6b6b6b;
      --blanco:     #ffffff;
      --sombra:     0 10px 30px rgba(0, 0, 0, 0.10);
      --radio:      18px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Helvetica, 'Helvetica Neue', Arial, sans-serif;
      background-color: var(--crema);
      background-image: radial-gradient(var(--crema-osc) 1.2px, transparent 1.2px);
      background-size: 22px 22px;
      color: var(--carbon);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    /* ---------- Encabezado ---------- */
    header {
      text-align: center;
      margin-bottom: 32px;
      animation: subir 0.6s ease both;
    }
    header h1 {
      font-weight: 800;
      font-size: 42px;
      letter-spacing: -0.5px;
      margin-top: 8px;
    }
    header h1 span { color: var(--tomate); }
    header p { color: var(--gris); margin-top: 6px; font-size: 16px; }

    /* ---------- Tarjeta central ---------- */
    .tarjeta {
      background: var(--blanco);
      border-radius: var(--radio);
      box-shadow: var(--sombra);
      width: 100%;
      max-width: 520px;
      padding: 34px;
      animation: subir 0.7s ease both;
    }

    /* ---------- Pestañas ---------- */
    .pestanas { display: flex; gap: 8px; margin-bottom: 24px; }
    .pestanas button {
      flex: 1;
      padding: 12px;
      border: none;
      background: var(--crema);
      color: var(--gris);
      font-family: inherit;
      font-weight: 600;
      font-size: 15px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .pestanas button.activa { background: var(--carbon); color: var(--blanco); }

    /* ---------- Formularios ---------- */
    label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 13px 15px;
      border: 1.5px solid var(--crema-osc);
      border-radius: 12px;
      font-family: inherit;
      font-size: 15px;
      margin-bottom: 16px;
      background: var(--crema);
      transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: var(--tomate); background: var(--blanco); }

    /* ---------- Botones ---------- */
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.15s, background 0.2s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-principal { background: var(--tomate); color: var(--blanco); }
    .btn-principal:hover { background: var(--tomate-osc); }
    .btn-negro { background: var(--carbon); color: var(--blanco); }
    .btn-negro:hover { background: #2e2e2e; }
    .btn-fantasma {
      background: transparent;
      color: var(--gris);
      border: 1.5px solid var(--crema-osc);
      width: auto;
      padding: 9px 16px;
      font-size: 14px;
    }
    .btn-fantasma:hover { border-color: var(--tomate); color: var(--tomate); }
    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    /* ---------- Mensajes de aviso ---------- */
    .aviso {
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }
    .aviso.error { background: #ffe6d6; color: var(--tomate-osc); display: block; }
    .aviso.ok    { background: #161616; color: #ffffff;           display: block; }

    /* ---------- Pantallas ocultas por defecto ---------- */
    #pantalla-despensa,
    #pantalla-receta,
    #pantalla-historial { display: none; }

    /* ---------- Barra de usuario ---------- */
    .barra-usuario {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 22px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .barra-usuario .correo { font-size: 14px; color: var(--gris); }

    /* ---------- Navegación interna (Despensa / Historial) ---------- */
    .nav-interna {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
    }
    .nav-interna button {
      flex: 1;
      padding: 10px;
      border: 1.5px solid var(--crema-osc);
      background: transparent;
      color: var(--gris);
      font-family: inherit;
      font-weight: 600;
      font-size: 14px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .nav-interna button.activa {
      background: var(--carbon);
      color: var(--blanco);
      border-color: var(--carbon);
    }

    /* ---------- Fila agregar ingrediente ---------- */
    .fila-agregar { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
    .fila-agregar input { margin-bottom: 8px; }
    .fila-agregar .campo-nombre   { flex: 2; min-width: 130px; }
    .fila-agregar .campo-cantidad { flex: 1; min-width: 70px; }
    .fila-agregar .campo-unidad   { flex: 1; min-width: 90px; }

    /* ---------- Lista de ingredientes ---------- */
    .lista { list-style: none; margin-top: 18px; }
    .lista li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      background: var(--crema);
      border-radius: 12px;
      margin-bottom: 10px;
      animation: subir 0.3s ease both;
    }
    .lista .info-ing { font-weight: 500; }
    .lista .cantidad { color: var(--gris); font-size: 14px; font-weight: 400; }
    .lista .borrar {
      background: none;
      border: 1.5px solid var(--crema-osc);
      color: var(--tomate);
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      padding: 7px 14px;
      border-radius: 9px;
    }
    .lista .borrar:hover { background: #ffe6d6; border-color: var(--tomate); }
    .acciones { display: flex; gap: 6px; flex-shrink: 0; }
    .lista .editar {
      background: none;
      border: 1.5px solid var(--crema-osc);
      color: var(--verde);
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      padding: 7px 14px;
      border-radius: 9px;
    }
    .lista .editar:hover { background: #f0f0f0; border-color: var(--carbon); }
    .fila-editar { display: flex; gap: 6px; flex: 1; flex-wrap: wrap; }
    .fila-editar input { margin-bottom: 0; padding: 8px 10px; font-size: 14px; }
    .fila-editar input:nth-child(1) { flex: 2; min-width: 100px; }
    .fila-editar input:nth-child(2) { flex: 1; min-width: 55px; }
    .fila-editar input:nth-child(3) { flex: 1; min-width: 70px; }

    .vacio { text-align: center; color: var(--gris); padding: 24px; font-style: italic; }

    /* ---------- Botón generar receta ---------- */
    .btn-generar-wrap { margin-top: 20px; }
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2.5px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: girar 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes girar { to { transform: rotate(360deg); } }

    /* ---------- PANTALLA RECETA ---------- */
    .receta-titulo {
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 6px;
      line-height: 1.2;
    }
    .receta-meta {
      display: flex;
      gap: 12px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }
    .badge-tiempo { background: #fff3e0; color: #e65100; }
    .badge-dificultad { background: var(--crema); color: var(--carbon); }

    .receta-seccion { margin-bottom: 20px; }
    .receta-seccion h3 {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--gris);
      margin-bottom: 10px;
    }
    .receta-seccion ul, .receta-seccion ol {
      padding-left: 18px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .receta-seccion li {
      font-size: 15px;
      line-height: 1.5;
    }
    .receta-seccion ol li { color: var(--carbon); }
    .receta-seccion ul li { color: var(--gris); }
    .receta-seccion ul li::marker { color: var(--tomate); }

    .receta-acciones {
      display: flex;
      gap: 10px;
      margin-top: 24px;
      flex-wrap: wrap;
    }
    .receta-acciones .btn { width: auto; flex: 1; min-width: 140px; }

    /* ---------- PANTALLA HISTORIAL ---------- */
    .historial-item {
      background: var(--crema);
      border-radius: 14px;
      padding: 16px 18px;
      margin-bottom: 12px;
      animation: subir 0.3s ease both;
    }
    .historial-item .nombre-receta {
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 4px;
    }
    .historial-item .fecha {
      font-size: 12px;
      color: var(--gris);
      margin-bottom: 12px;
    }
    .historial-item .fila-inferior {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    /* Estrellas */
    .estrellas { display: flex; gap: 3px; }
    .estrella {
      font-size: 22px;
      cursor: pointer;
      color: var(--crema-osc);
      transition: color 0.15s, transform 0.1s;
      line-height: 1;
    }
    .estrella:hover,
    .estrella.activa { color: #ff9800; }
    .estrella:hover { transform: scale(1.2); }

    .historial-btns { display: flex; gap: 8px; }
    .btn-ver-hist {
      background: none;
      border: 1.5px solid var(--crema-osc);
      color: var(--carbon);
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      padding: 7px 14px;
      border-radius: 9px;
      transition: all 0.2s;
    }
    .btn-ver-hist:hover { border-color: var(--carbon); background: var(--carbon); color: var(--blanco); }
    .btn-del-hist {
      background: none;
      border: 1.5px solid var(--crema-osc);
      color: var(--tomate);
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      padding: 7px 14px;
      border-radius: 9px;
      transition: all 0.2s;
    }
    .btn-del-hist:hover { background: #ffe6d6; border-color: var(--tomate); }

    .promedio-badge {
      font-size: 13px;
      color: var(--gris);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .promedio-badge span { color: #ff9800; font-weight: 700; }

    /* ---------- Animación de entrada ---------- */
    @keyframes subir {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    footer { margin-top: 28px; color: var(--gris); font-size: 13px; text-align: center; }
  </style>
</head>

<body>
  <header>
    <h1>Mi <span>Mercadito</span></h1>
    <p>Registra tus ingredientes y prepárate para cocinar</p>
  </header>

  <!-- ============ PANTALLA 1: ACCESO ============ -->
  <div class="tarjeta" id="pantalla-acceso">
    <div class="pestanas">
      <button id="tab-login" class="activa" onclick="cambiarPestana('login')">Iniciar sesión</button>
      <button id="tab-registro" onclick="cambiarPestana('registro')">Registrarse</button>
    </div>
    <div class="aviso" id="aviso-acceso"></div>
    <label for="email">Correo electrónico</label>
    <input type="email" id="email" placeholder="tucorreo@ejemplo.com">
    <label for="password">Contraseña</label>
    <input type="password" id="password" placeholder="••••••••">
    <button class="btn btn-principal" id="btn-acceso" onclick="enviarAcceso()">Entrar</button>
  </div>

  <!-- ============ PANTALLA 2: DESPENSA ============ -->
  <div class="tarjeta" id="pantalla-despensa">
    <div class="barra-usuario">
      <span class="correo" id="texto-usuario"></span>
      <button class="btn btn-fantasma" onclick="cerrarSesion()">Cerrar sesión</button>
    </div>

    <!-- Navegación: Despensa / Historial -->
    <div class="nav-interna">
     <button id="nav-despensa" class="activa" onclick="mostrarTab('despensa')">🏠 Inicio</button>
      <button id="nav-historial" onclick="mostrarTab('historial')">📖 Mis recetas</button>
    </div>

    <!-- SUB-SECCIÓN: Despensa (ingredientes) -->
    <div id="sub-despensa">
      <div class="aviso" id="aviso-despensa"></div>
      <div class="fila-agregar">
        <input class="campo-nombre"   type="text"   id="ing-nombre"   placeholder="Ingrediente (ej: Tomate)">
        <input class="campo-cantidad" type="number" id="ing-cantidad" placeholder="Cant." value="1" min="0">
        <input class="campo-unidad"   type="text"   id="ing-unidad"   placeholder="Unidad" value="unidad">
      </div>
      <button class="btn btn-principal" onclick="agregarIngrediente()">Agregar al mercadito</button>
      <ul class="lista" id="lista-ingredientes"></ul>

      <!-- Botón generar receta -->
      <div class="btn-generar-wrap">
        <button class="btn btn-negro" id="btn-generar" onclick="generarReceta()">
          ✨ Generar receta con mi despensa
        </button>
      </div>
    </div>

    <!-- SUB-SECCIÓN: Historial -->
    <div id="sub-historial" style="display:none">
      <div class="aviso" id="aviso-historial"></div>
      <div id="lista-historial"></div>
    </div>
  </div>

  <!-- ============ PANTALLA 3: RECETA GENERADA ============ -->
  <div class="tarjeta" id="pantalla-receta">
    <div class="barra-usuario">
      <span class="correo">Receta generada ✨</span>
      <button class="btn btn-fantasma" onclick="volverADespensa()">← Volver</button>
    </div>
    <div class="aviso" id="aviso-receta"></div>

    <div id="contenido-receta">
      <!-- Se llena dinámicamente desde JS -->
    </div>
  </div>

  <footer>Proyecto final · Tecnologías Web · 2026</footer>

  <!-- ============================================================
       JAVASCRIPT
  ============================================================ -->
  <script>
    // ─── Token ───────────────────────────────────────────────
    function guardarToken(t)  { localStorage.setItem("token", t); }
    function obtenerToken()   { return localStorage.getItem("token"); }
    function borrarToken()    { localStorage.removeItem("token"); }

    let modoAcceso = "login";
    let tabActual  = "despensa";          // "despensa" o "historial"
    let ingredientesActuales = [];
    let recetaActual = null;              // receta que se está mostrando en pantalla-receta

    // ─── Pestañas de acceso ───────────────────────────────────
    function cambiarPestana(modo) {
      modoAcceso = modo;
      document.getElementById("tab-login").classList.toggle("activa", modo === "login");
      document.getElementById("tab-registro").classList.toggle("activa", modo === "registro");
      document.getElementById("btn-acceso").textContent = modo === "login" ? "Entrar" : "Crear cuenta";
      ocultarAviso("aviso-acceso");
    }

    // ─── Avisos ───────────────────────────────────────────────
    function mostrarAviso(id, texto, tipo) {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = texto;
      el.className = "aviso " + tipo;
    }
    function ocultarAviso(id) {
      const el = document.getElementById(id);
      if (el) el.className = "aviso";
    }

    // ─── Acceso ───────────────────────────────────────────────
    async function enviarAcceso() {
      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      if (!email || !password) {
        mostrarAviso("aviso-acceso", "Escribe tu correo y contraseña.", "error");
        return;
      }
      const ruta = modoAcceso === "login" ? "/usuarios/login" : "/usuarios/registro";
      try {
        const resp  = await fetch(ruta, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });
        const datos = await resp.json();
        if (!resp.ok) {
          mostrarAviso("aviso-acceso", datos.detail || "Ocurrió un error.", "error");
          return;
        }
        if (modoAcceso === "registro") {
          mostrarAviso("aviso-acceso", "¡Cuenta creada! Ahora inicia sesión.", "ok");
          cambiarPestana("login");
          return;
        }
        guardarToken(datos.access_token);
        entrarADespensa(email);
      } catch {
        mostrarAviso("aviso-acceso", "No se pudo conectar con el servidor.", "error");
      }
    }

    // ─── Entrar / Salir ───────────────────────────────────────
    function entrarADespensa(email) {
      document.getElementById("pantalla-acceso").style.display  = "none";
      document.getElementById("pantalla-receta").style.display  = "none";
      document.getElementById("pantalla-despensa").style.display = "block";
      document.getElementById("texto-usuario").textContent = email || "Tu mercadito";
      mostrarTab("despensa");
      cargarIngredientes();
    }

    function volverADespensa() {
      document.getElementById("pantalla-receta").style.display   = "none";
      document.getElementById("pantalla-despensa").style.display = "block";
      mostrarTab("despensa");
    }

    function cerrarSesion() {
      borrarToken();
      document.getElementById("pantalla-despensa").style.display = "none";
      document.getElementById("pantalla-receta").style.display   = "none";
      document.getElementById("pantalla-acceso").style.display   = "block";
      document.getElementById("password").value = "";
    }

    // ─── Navegación interna (Despensa / Historial) ────────────
    function mostrarTab(tab) {
      tabActual = tab;
      document.getElementById("nav-despensa").classList.toggle("activa",  tab === "despensa");
      document.getElementById("nav-historial").classList.toggle("activa", tab === "historial");
      document.getElementById("sub-despensa").style.display  = tab === "despensa"  ? "block" : "none";
      document.getElementById("sub-historial").style.display = tab === "historial" ? "block" : "none";
      if (tab === "historial") cargarHistorial();
    }

    // ─── Ingredientes ─────────────────────────────────────────
    async function cargarIngredientes() {
      try {
        const resp = await fetch("/ingredientes/", {
          headers: { "Authorization": "Bearer " + obtenerToken() },
        });
        if (resp.status === 401) { cerrarSesion(); return; }
        ingredientesActuales = await resp.json();
        pintarLista(ingredientesActuales);
      } catch {
        mostrarAviso("aviso-despensa", "No se pudieron cargar los ingredientes.", "error");
      }
    }

    function pintarLista(ingredientes) {
      const lista = document.getElementById("lista-ingredientes");
      lista.innerHTML = "";
      if (ingredientes.length === 0) {
        lista.innerHTML = '<div class="vacio">Tu mercadito está vacío. Agrega tu primer ingrediente.</div>';
        return;
      }
      ingredientes.forEach(function(ing) {
        const li = document.createElement("li");
        li.id = "fila-" + ing.id;
        li.innerHTML =
          '<span class="info-ing">' + ing.nombre +
          ' <span class="cantidad">· ' + ing.cantidad + ' ' + ing.unidad + '</span></span>' +
          '<span class="acciones">' +
          '  <button class="editar" onclick="editarIngrediente(' + ing.id + ')">Editar</button>' +
          '  <button class="borrar" onclick="borrarIngrediente(' + ing.id + ')">Eliminar</button>' +
          '</span>';
        lista.appendChild(li);
      });
    }

    function editarIngrediente(id) {
      const ing = ingredientesActuales.find(x => x.id === id);
      if (!ing) return;
      const li = document.getElementById("fila-" + id);
      li.innerHTML =
        '<div class="fila-editar">' +
        '  <input id="edit-nombre-' + id + '" value="' + ing.nombre + '">' +
        '  <input id="edit-cantidad-' + id + '" type="number" value="' + ing.cantidad + '">' +
        '  <input id="edit-unidad-' + id + '" value="' + ing.unidad + '">' +
        '</div>' +
        '<span class="acciones">' +
        '  <button class="editar" onclick="guardarEdicion(' + id + ')">Guardar</button>' +
        '  <button class="borrar" onclick="cargarIngredientes()">Cancelar</button>' +
        '</span>';
    }

    async function guardarEdicion(id) {
      const nombre   = document.getElementById("edit-nombre-"   + id).value.trim();
      const cantidad = parseFloat(document.getElementById("edit-cantidad-" + id).value) || 1;
      const unidad   = document.getElementById("edit-unidad-"   + id).value.trim() || "unidad";
      if (!nombre) { mostrarAviso("aviso-despensa", "El nombre no puede quedar vacío.", "error"); return; }
      try {
        const resp = await fetch("/ingredientes/" + id, {
          method: "PUT",
          headers: { "Content-Type": "application/json", "Authorization": "Bearer " + obtenerToken() },
          body: JSON.stringify({ nombre, cantidad, unidad }),
        });
        if (resp.status === 401) { cerrarSesion(); return; }
        ocultarAviso("aviso-despensa");
        cargarIngredientes();
      } catch {
        mostrarAviso("aviso-despensa", "No se pudo guardar el cambio.", "error");
      }
    }

    async function agregarIngrediente() {
      const nombre   = document.getElementById("ing-nombre").value.trim();
      const cantidad = parseFloat(document.getElementById("ing-cantidad").value) || 1;
      const unidad   = document.getElementById("ing-unidad").value.trim() || "unidad";
      if (!nombre) { mostrarAviso("aviso-despensa", "Escribe el nombre del ingrediente.", "error"); return; }
      try {
        const resp = await fetch("/ingredientes/", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": "Bearer " + obtenerToken() },
          body: JSON.stringify({ nombre, cantidad, unidad }),
        });
        if (resp.status === 401) { cerrarSesion(); return; }
        document.getElementById("ing-nombre").value   = "";
        document.getElementById("ing-cantidad").value = "1";
        document.getElementById("ing-unidad").value   = "unidad";
        ocultarAviso("aviso-despensa");
        cargarIngredientes();
      } catch {
        mostrarAviso("aviso-despensa", "No se pudo agregar el ingrediente.", "error");
      }
    }

    async function borrarIngrediente(id) {
      if (!confirm("¿Seguro que quieres eliminar este ingrediente?")) return;
      try {
        const resp = await fetch("/ingredientes/" + id, {
          method: "DELETE",
          headers: { "Authorization": "Bearer " + obtenerToken() },
        });
        if (resp.status === 401) { cerrarSesion(); return; }
        cargarIngredientes();
      } catch {
        mostrarAviso("aviso-despensa", "No se pudo borrar el ingrediente.", "error");
      }
    }

    // ─── GENERAR RECETA (Funcionalidad 3) ────────────────────
    async function generarReceta() {
      if (ingredientesActuales.length === 0) {
        mostrarAviso("aviso-despensa", "Agrega al menos un ingrediente antes de generar una receta.", "error");
        return;
      }

      const btn = document.getElementById("btn-generar");
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Generando receta…';

      try {
        const resp = await fetch("/recetas/generar", {
          method: "POST",
          headers: { "Authorization": "Bearer " + obtenerToken() },
        });

        if (resp.status === 401) { cerrarSesion(); return; }

        if (!resp.ok) {
          const err = await resp.json();
          mostrarAviso("aviso-despensa", err.detail || "Error al generar la receta.", "error");
          return;
        }

        const receta = await resp.json();
        recetaActual = receta;
        mostrarPantallaReceta(receta);

      } catch {
        mostrarAviso("aviso-despensa", "No se pudo conectar con el servidor.", "error");
      } finally {
        btn.disabled = false;
        btn.innerHTML = "✨ Generar receta con mi despensa";
      }
    }

    // ─── PANTALLA RECETA (Funcionalidad 3 + vista) ───────────
    function mostrarPantallaReceta(receta) {
      document.getElementById("pantalla-despensa").style.display = "none";
      document.getElementById("pantalla-receta").style.display   = "block";
      ocultarAviso("aviso-receta");

      const dificultadEmoji = { "fácil": "🟢", "media": "🟡", "difícil": "🔴" };
      const emoji = dificultadEmoji[receta.dificultad] || "⚪";

      const ingredientesHTML = receta.ingredientes
        .map(i => '<li>' + i + '</li>')
        .join("");

      const pasosHTML = receta.pasos
        .map(p => '<li>' + p + '</li>')
        .join("");

      document.getElementById("contenido-receta").innerHTML = `
        <div class="receta-titulo">${receta.nombre}</div>
        <div class="receta-meta">
          <span class="badge badge-tiempo">⏱ ${receta.tiempo_minutos} min</span>
          <span class="badge badge-dificultad">${emoji} ${receta.dificultad}</span>
        </div>

        <div class="receta-seccion">
          <h3>Ingredientes</h3>
          <ul>${ingredientesHTML}</ul>
        </div>

        <div class="receta-seccion">
          <h3>Preparación</h3>
          <ol>${pasosHTML}</ol>
        </div>

        <div class="receta-acciones">
          <button class="btn btn-negro" onclick="volverADespensa()">← Volver</button>
          <button class="btn btn-principal" onclick="irAHistorial()">Ver mis recetas →</button>
        </div>
      `;
    }

    function irAHistorial() {
      document.getElementById("pantalla-receta").style.display   = "none";
      document.getElementById("pantalla-despensa").style.display = "block";
      mostrarTab("historial");
    }

    // ─── HISTORIAL (Funcionalidad 4) ─────────────────────────
    async function cargarHistorial() {
      const contenedor = document.getElementById("lista-historial");
      contenedor.innerHTML = '<div class="vacio">Cargando…</div>';
      ocultarAviso("aviso-historial");

      try {
        const resp = await fetch("/recetas/", {
          headers: { "Authorization": "Bearer " + obtenerToken() },
        });
        if (resp.status === 401) { cerrarSesion(); return; }

        const recetas = await resp.json();

        if (recetas.length === 0) {
          contenedor.innerHTML = '<div class="vacio">Todavía no has generado ninguna receta.</div>';
          return;
        }

        contenedor.innerHTML = "";
        recetas.forEach(r => contenedor.appendChild(crearItemHistorial(r)));

      } catch {
        mostrarAviso("aviso-historial", "No se pudo cargar el historial.", "error");
      }
    }

    function crearItemHistorial(receta) {
      const div = document.createElement("div");
      div.className = "historial-item";
      div.id = "hist-" + receta.id;

      const fecha = new Date(receta.creado_en).toLocaleDateString("es-CO", {
        day: "2-digit", month: "short", year: "numeric",
        hour: "2-digit", minute: "2-digit",
      });

      const promedioHTML = receta.calificacion_promedio
        ? `<span class="promedio-badge">⭐ <span>${receta.calificacion_promedio}</span></span>`
        : `<span class="promedio-badge" style="color:var(--crema-osc)">Sin calificar</span>`;

      div.innerHTML = `
        <div class="nombre-receta">${receta.nombre}</div>
        <div class="fecha">${fecha}</div>
        <div class="fila-inferior">
          <div class="estrellas" id="estrellas-${receta.id}">
            ${[1,2,3,4,5].map(n =>
              `<span class="estrella" data-valor="${n}" data-receta="${receta.id}" onclick="calificar(${receta.id}, ${n})">★</span>`
            ).join("")}
          </div>
          ${promedioHTML}
          <div class="historial-btns">
            <button class="btn-ver-hist" onclick="verRecetaDelHistorial(${receta.id})">Ver</button>
            <button class="btn-del-hist" onclick="eliminarReceta(${receta.id})">Eliminar</button>
          </div>
        </div>
      `;

      // Coloreamos las estrellas si ya tiene calificación
      if (receta.calificacion_promedio) {
        const promedio = Math.round(receta.calificacion_promedio);
        marcarEstrellas(receta.id, promedio);
      }

      return div;
    }

    // ─── CALIFICAR (Funcionalidad 5) ─────────────────────────
    async function calificar(recetaId, estrellas) {
      marcarEstrellas(recetaId, estrellas);

      try {
        // Intentamos crear la calificación; si ya existe, la actualizamos
        let resp = await fetch("/recetas/" + recetaId + "/calificar", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + obtenerToken(),
          },
          body: JSON.stringify({ estrellas }),
        });

        if (resp.status === 401) { cerrarSesion(); return; }

        // 400 = ya existe, usamos PUT para actualizar
        if (resp.status === 400) {
          resp = await fetch("/recetas/" + recetaId + "/calificar", {
            method: "PUT",
            headers: {
              "Content-Type": "application/json",
              "Authorization": "Bearer " + obtenerToken(),
            },
            body: JSON.stringify({ estrellas }),
          });
        }

        if (!resp.ok) {
          mostrarAviso("aviso-historial", "No se pudo guardar la calificación.", "error");
        }
      } catch {
        mostrarAviso("aviso-historial", "Error de conexión al calificar.", "error");
      }
    }

    function marcarEstrellas(recetaId, cantidad) {
      const contenedor = document.getElementById("estrellas-" + recetaId);
      if (!contenedor) return;
      contenedor.querySelectorAll(".estrella").forEach(function(el) {
        el.classList.toggle("activa", parseInt(el.dataset.valor) <= cantidad);
      });
    }

    // ─── VER RECETA DEL HISTORIAL ─────────────────────────────
    async function verRecetaDelHistorial(recetaId) {
      try {
        const resp = await fetch("/recetas/" + recetaId, {
          headers: { "Authorization": "Bearer " + obtenerToken() },
        });
        if (resp.status === 401) { cerrarSesion(); return; }
        const datos = await resp.json();
        const receta = JSON.parse(datos.contenido_json);
        mostrarPantallaReceta(receta);
      } catch {
        mostrarAviso("aviso-historial", "No se pudo cargar la receta.", "error");
      }
    }

    // ─── ELIMINAR RECETA (Funcionalidad 6) ───────────────────
    async function eliminarReceta(id) {
      if (!confirm("¿Eliminar esta receta del historial?")) return;
      try {
        const resp = await fetch("/recetas/" + id, {
          method: "DELETE",
          headers: { "Authorization": "Bearer " + obtenerToken() },
        });
        if (resp.status === 401) { cerrarSesion(); return; }
        // Quitamos el elemento de la pantalla sin recargar toda la lista
        const el = document.getElementById("hist-" + id);
        if (el) el.remove();
        const lista = document.getElementById("lista-historial");
        if (lista && lista.children.length === 0) {
          lista.innerHTML = '<div class="vacio">Todavía no has generado ninguna receta.</div>';
        }
      } catch {
        mostrarAviso("aviso-historial", "No se pudo eliminar la receta.", "error");
      }
    }

    // ─── Al abrir la página ───────────────────────────────────
    if (obtenerToken()) {
      entrarADespensa("Tu mercadito");
    }
  </script>
</body>
</html>
